<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brain Dump v3</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, sans-serif; background: #0f0f0f; color: #e0e0e0; height: 100dvh; display: flex; flex-direction: column; }
  #header { padding: 12px 20px; border-bottom: 1px solid #222; font-weight: 600; font-size: 15px; color: #aaa; }
  #messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
  .msg { max-width: 75%; padding: 10px 14px; border-radius: 14px; line-height: 1.5; font-size: 14px; white-space: pre-wrap; word-break: break-word; }
  .msg.user { align-self: flex-end; background: #2563eb; color: #fff; border-bottom-right-radius: 4px; }
  .msg.assistant { align-self: flex-start; background: #1e1e1e; border: 1px solid #2a2a2a; border-bottom-left-radius: 4px; }
  .msg.system { align-self: center; background: #1a2a1a; border: 1px solid #2a4a2a; color: #6fcf6f; font-size: 13px; max-width: 90%; }
  #input-area { padding: 16px 20px; border-top: 1px solid #222; display: flex; gap: 10px; }
  #input { flex: 1; background: #1a1a1a; border: 1px solid #333; border-radius: 10px; padding: 10px 14px; color: #e0e0e0; font-size: 14px; resize: none; outline: none; font-family: inherit; line-height: 1.5; max-height: 140px; overflow-y: auto; }
  #input:focus { border-color: #2563eb; }
  #send { background: #2563eb; color: #fff; border: none; border-radius: 10px; padding: 10px 18px; font-size: 14px; cursor: pointer; font-weight: 500; white-space: nowrap; }
  #send:hover { background: #1d4ed8; }
  #send:disabled { background: #333; color: #666; cursor: default; }
  .cursor { display: inline-block; width: 2px; height: 1em; background: #aaa; margin-left: 2px; animation: blink 1s step-end infinite; vertical-align: text-bottom; }
  @keyframes blink { 50% { opacity: 0; } }
</style>
</head>
<body>
<div id="header">Brain Dump v3 &mdash; your personal knowledge base</div>
<div id="messages">
  <div class="msg system">Start by adding ideas, todos, or notes. Try: "Remember that I need to call the dentist" or ask "What do I need to do today?"</div>
</div>
<div id="input-area">
  <textarea id="input" placeholder="Add a note or ask a question..." rows="1"></textarea>
  <button id="send">Send</button>
</div>

<script>
  const messagesEl = document.getElementById('messages');
  const inputEl = document.getElementById('input');
  const sendBtn = document.getElementById('send');

  function appendMsg(role, text) {
    const el = document.createElement('div');
    el.className = `msg ${role}`;
    el.textContent = text;
    messagesEl.appendChild(el);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return el;
  }

  function setLoading(on) {
    sendBtn.disabled = on;
    inputEl.disabled = on;
  }

  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text) return;
    inputEl.value = '';
    inputEl.style.height = 'auto';
    appendMsg('user', text);
    setLoading(true);

    try {
      const resp = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text }),
      });

      const ct = resp.headers.get('content-type') || '';

      if (ct.includes('application/json')) {
        const data = await resp.json();
        const preview = data.note.content.length > 80
          ? data.note.content.slice(0, 80) + '...'
          : data.note.content;
        const tagStr = data.note.tags.length ? ` [${data.note.tags.join(', ')}]` : '';
        appendMsg('system', `Saved note${tagStr}: "${preview}"`);
        return;
      }

      // SSE stream
      const msgEl = appendMsg('assistant', '');
      const cursor = document.createElement('span');
      cursor.className = 'cursor';
      msgEl.appendChild(cursor);

      const reader = resp.body.getReader();
      const decoder = new TextDecoder();
      let buffer = '';

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split('\n');
        buffer = lines.pop();
        for (const line of lines) {
          if (!line.startsWith('data: ')) continue;
          const payload = line.slice(6);
          if (payload === '[DONE]') { cursor.remove(); return; }
          try {
            const { type, text } = JSON.parse(payload);
            if (type === 'chunk') {
              msgEl.insertBefore(document.createTextNode(text), cursor);
              messagesEl.scrollTop = messagesEl.scrollHeight;
            } else if (type === 'error') {
              msgEl.insertBefore(document.createTextNode(`[Error: ${text}]`), cursor);
            }
          } catch {}
        }
      }
      cursor.remove();
    } catch (err) {
      appendMsg('system', `Error: ${err.message}`);
    } finally {
      setLoading(false);
      inputEl.focus();
    }
  }

  sendBtn.addEventListener('click', sendMessage);
  inputEl.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });
  inputEl.addEventListener('input', () => {
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 140) + 'px';
  });
</script>
</body>
</html>
